<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Apps Associates — Acronym &amp; Glossary Guide</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f4f6f9;
    color: #1a1a2e;
    padding: 1.5rem;
    min-height: 100vh;
  }
  .hero {
    background: linear-gradient(135deg, #1a3a6b 0%, #1e5fa0 50%, #2980c4 100%);
    padding: 2rem 2rem 1.75rem;
    text-align: center;
    border-radius: 16px;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; top: -40px; right: -40px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .hero::after {
    content: '';
    position: absolute; bottom: -60px; left: -20px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .hero-logo {
    display: block;
    margin: 0 auto 1rem;
    height: 56px;
    width: auto;
    position: relative;
    z-index: 1;
  }
  .hero p {
    font-size: 14px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 1.25rem;
    position: relative;
    z-index: 1;
  }
  .stat-row {
    display: flex;
    justify-content: center;
    gap: 2.5rem;
    position: relative;
    z-index: 1;
  }
  .stat-num { font-size: 24px; font-weight: 600; color: #fff; }
  .stat-label { font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.05em; }
  .controls { display: flex; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-wrap input {
    width: 100%;
    padding: 10px 14px 10px 40px;
    border: 1.5px solid #d0d8e8;
    border-radius: 30px;
    font-size: 14px;
    background: #fff;
    color: #1a1a2e;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: #1e5fa0; box-shadow: 0 0 0 3px rgba(30,95,160,0.1); }
  .search-icon {
    position: absolute; left: 13px; top: 50%;
    transform: translateY(-50%);
    color: #8a9abc; font-size: 15px; pointer-events: none;
  }
  .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .pill {
    padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1.5px solid #d0d8e8; background: #fff; color: #5a6a8a; transition: all 0.15s;
  }
  .pill:hover { border-color: #8a9abc; }
  .pill.active { color: #fff; border-color: transparent; }
  .pill-all.active    { background: #1a3a6b; }
  .pill-tech.active   { background: #1565a3; }
  .pill-biz.active    { background: #c0392b; }
  .pill-oracle.active { background: #e67e22; }
  .pill-apps.active   { background: #27ae60; }
  .pill-finance.active{ background: #8e44ad; }
  .results-meta { font-size: 13px; color: #7a8aaa; margin-bottom: 0.75rem; }
  .results-meta span { font-weight: 600; color: #3a4a6a; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .card {
    background: #fff; border: 1px solid #e0e8f4;
    border-top: 3px solid var(--accent, #1e5fa0);
    border-radius: 12px; padding: 1rem 1.1rem;
    cursor: pointer; transition: transform 0.12s, box-shadow 0.12s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(30,95,160,0.1); }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
  .card-acronym { font-size: 20px; font-weight: 700; color: var(--accent, #1e5fa0); font-family: 'Courier New', monospace; letter-spacing: 0.02em; }
  .card-tag { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0; }
  .card-meaning { font-size: 14px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; line-height: 1.4; }
  .card-notes { font-size: 12.5px; color: #5a6a8a; line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card.expanded .card-notes { display: block; -webkit-line-clamp: unset; }
  .expand-hint { font-size: 11px; color: var(--accent, #1e5fa0); margin-top: 5px; font-weight: 600; }
  .empty { grid-column: 1/-1; text-align: center; padding: 3rem; color: #7a8aaa; background: #fff; border-radius: 12px; border: 1px dashed #d0d8e8; }
  .empty-icon { font-size: 40px; margin-bottom: 0.5rem; }
  .empty h3 { font-size: 16px; font-weight: 600; margin-bottom: 0.25rem; color: #3a4a6a; }
  mark { background: #fff9c4; border-radius: 2px; padding: 0 1px; color: inherit; }
</style>
</head>

var catConfig={
  tech:    {label:"Technology",    color:"#1565a3", bg:"#ddeeff", textc:"#0c447c"},
  biz:     {label:"Business",      color:"#c0392b", bg:"#fde8e8", textc:"#791f1f"},
  oracle:  {label:"Oracle",        color:"#d4680a", bg:"#fdf0e0", textc:"#633806"},
  apps:    {label:"Apps Internal", color:"#1e8a4a", bg:"#e2f7ec", textc:"#0f5530"},
  finance: {label:"Finance",       color:"#7b30a8", bg:"#f4e6fc", textc:"#4a1b5a"}
};

var activeFilter="all";
var expandedCard=null;

function setFilter(btn,f){
  activeFilter=f;
  document.querySelectorAll(".pill").forEach(function(p){p.classList.remove("active");});
  btn.classList.add("active");
  render();
}

function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function highlight(text,q){
  if(!q) return esc(text);
  var safe=esc(text);
  var re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
  return safe.replace(re,"<mark>$1</mark>");
}

function render(){
  var q=document.getElementById("search").value.toLowerCase().trim();
  var grid=document.getElementById("grid");
  var meta=document.getElementById("meta");

  var filtered=data.filter(function(d){
    if(activeFilter!=="all"&&d.cat!==activeFilter) return false;
    if(!q) return true;
    return d.a.toLowerCase().indexOf(q)>-1||d.m.toLowerCase().indexOf(q)>-1||d.n.toLowerCase().indexOf(q)>-1;
  }).sort(function(a,b){return a.a.localeCompare(b.a);});

  document.getElementById("total-count").textContent=data.length;
  meta.innerHTML=(q||activeFilter!=="all")
    ?"Showing <span>"+filtered.length+"</span> of "+data.length+" terms"
    :"Showing all <span>"+filtered.length+"</span> terms";

  if(!filtered.length){
    grid.innerHTML='<div class="empty"><div class="empty-icon">&#128269;</div><h3>No terms found</h3><p>Try a different search or filter.</p></div>';
    return;
  }

  var html="";
  for(var i=0;i<filtered.length;i++){
    var d=filtered[i];
    var cfg=catConfig[d.cat]||{label:"Other",color:"#888",bg:"#f0f0f0",textc:"#444"};
    var isExp=expandedCard===d.a;
    html+='<div class="card'+(isExp?" expanded":"")+'" style="--accent:'+cfg.color+'" onclick="toggleExpand(\''+d.a.replace(/'/g,"\\'")+'\')">'
      +'<div class="card-header">'
      +'<span class="card-acronym">'+highlight(d.a,q)+'</span>'
      +'<span class="card-tag" style="background:'+cfg.bg+';color:'+cfg.textc+'">'+cfg.label+'</span>'
      +'</div>'
      +'<div class="card-meaning">'+highlight(d.m,q)+'</div>'
      +'<div class="card-notes">'+highlight(d.n,q)+'</div>'
      +(!isExp&&d.n.length>100?'<div class="expand-hint">Tap to read more &#8595;</div>':'')
      +'</div>';
  }
  grid.innerHTML=html;
}

function toggleExpand(acronym){
  expandedCard=expandedCard===acronym?null:acronym;
  render();
}

render();
</script>
