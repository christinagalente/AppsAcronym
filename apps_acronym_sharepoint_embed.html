var catConfig={
  tech:{label:"Technology",color:"#1565a3",bg:"#ddeeff",textc:"#0c447c"},
  biz:{label:"Business",color:"#c0392b",bg:"#fde8e8",textc:"#791f1f"},
  oracle:{label:"Oracle",color:"#d4680a",bg:"#fdf0e0",textc:"#633806"},
  apps:{label:"Apps Internal",color:"#1e8a4a",bg:"#e2f7ec",textc:"#0f5530"},
  finance:{label:"Finance",color:"#7b30a8",bg:"#f4e6fc",textc:"#4a1b5a"}
};

var activeFilter="all";
var expandedCard=null;

function setFilter(btn,f){
  activeFilter=f;
  document.querySelectorAll(".pill").forEach(function(p){p.classList.remove("active")});
  btn.classList.add("active");
  render();
}

function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function highlight(text,q){
  if(!q)return esc(text);
  var safe=esc(text);
  var re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
  return safe.replace(re,"<mark>$1</mark>");
}

function render(){
  var q=document.getElementById("search").value.toLowerCase().trim();
  var grid=document.getElementById("grid");
  var meta=document.getElementById("meta");

  var filtered=data.filter(function(d){
    if(activeFilter!=="all"&&d.cat!==activeFilter)return false;
    if(!q)return true;
    return d.a.toLowerCase().indexOf(q)>-1||d.m.toLowerCase().indexOf(q)>-1||d.n.toLowerCase().indexOf(q)>-1;
  }).sort(function(a,b){return a.a.localeCompare(b.a)});

  document.getElementById("total-count").textContent=data.length;
  meta.innerHTML=(q||activeFilter!=="all")
    ?"Showing <span>"+filtered.length+"</span> of "+data.length+" terms"
    :"Showing all <span>"+filtered.length+"</span> terms";

  if(!filtered.length){
    grid.innerHTML="<div class=\"empty\"><div class=\"empty-icon\">&#128269;</div><h3>No terms found</h3><p>Try a different search or filter.</p></div>";
    return;
  }

  var html="";
  for(var i=0;i<filtered.length;i++){
    var d=filtered[i];
    var cfg=catConfig[d.cat]||{label:"Other",color:"#888",bg:"#f0f0f0",textc:"#444"};
    var isExp=expandedCard===d.a;
    var key=d.a.replace(/\\/g,"\\\\").replace(/"/g,"\\\"");
    html+="<div class=\"card"+(isExp?" expanded":"")+"\" style=\"--accent:"+cfg.color+"\" onclick=\"toggleExpand(&quot;"+key+"&quot;)\">"
      +"<div class=\"card-header\">"
      +"<span class=\"card-acronym\">"+highlight(d.a,q)+"</span>"
      +"<span class=\"card-tag\" style=\"background:"+cfg.bg+";color:"+cfg.textc+"\">"+cfg.label+"</span>"
      +"</div>"
      +"<div class=\"card-meaning\">"+highlight(d.m,q)+"</div>"
      +"<div class=\"card-notes\">"+highlight(d.n,q)+"</div>"
      +(!isExp&&d.n.length>100?"<div class=\"expand-hint\">Tap to read more &#8595;</div>":"")
      +"</div>";
  }
  grid.innerHTML=html;
}

function toggleExpand(acronym){
  expandedCard=expandedCard===acronym?null:acronym;
  render();
}

render();
</script>
